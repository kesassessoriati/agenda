version: "3.8"

services:
  agenda_api:
    image: kesassessoria/agenda-api:latest
    networks:
      - kesnet
    environment:
      - NODE_ENV=production
      - PORT=3333
      - DATABASE_URL=postgresql://postgres:ALTERE_SENHA_FORTE@agenda_postgres:5432/kes_agenda?schema=public
      - JWT_SECRET=ALTERE_PARA_UM_JWT_SECRET_FORTE
      - JWT_EXPIRES_IN=8h
      - WEB_URL=https://agenda.kesassessoria.com
      - API_URL=https://apiagenda.kesassessoria.com/api
      - DEMO_MODE=false
      - RUN_PRISMA_SEED=false
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=
      - GOOGLE_REDIRECT_URI=https://apiagenda.kesassessoria.com/api/google-calendar/callback
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3333/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M
      labels:
        - traefik.enable=1
        - traefik.http.routers.agenda-api.rule=Host(`apiagenda.kesassessoria.com`)
        - traefik.http.routers.agenda-api.entrypoints=websecure
        - traefik.http.routers.agenda-api.priority=100
        - traefik.http.routers.agenda-api.tls.certresolver=letsencryptresolver
        - traefik.http.routers.agenda-api.service=agenda-api
        - traefik.http.services.agenda-api.loadbalancer.server.port=3333
        - traefik.http.services.agenda-api.loadbalancer.passHostHeader=true

  agenda_web:
    image: kesassessoria/agenda-web:latest
    networks:
      - kesnet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
      labels:
        - traefik.enable=1
        - traefik.http.routers.agenda-web.rule=Host(`agenda.kesassessoria.com`)
        - traefik.http.routers.agenda-web.entrypoints=websecure
        - traefik.http.routers.agenda-web.priority=1
        - traefik.http.routers.agenda-web.tls.certresolver=letsencryptresolver
        - traefik.http.routers.agenda-web.service=agenda-web
        - traefik.http.services.agenda-web.loadbalancer.server.port=80
        - traefik.http.services.agenda-web.loadbalancer.passHostHeader=true

  agenda_postgres:
    image: postgres:16-alpine
    volumes:
      - agenda_postgres_data:/var/lib/postgresql/data
    networks:
      - kesnet
    environment:
      - POSTGRES_DB=kes_agenda
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ALTERE_SENHA_FORTE
      - TZ=America/Sao_Paulo
      - PGTZ=America/Sao_Paulo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kes_agenda"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M

volumes:
  agenda_postgres_data:
    name: agenda_postgres_data

networks:
  kesnet:
    external: true
    name: kesnet
